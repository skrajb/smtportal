<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smartech Education</title>

<style>

:root{
--bg:#f7f8fb;
--card:#fff;
--accent:#00295f;
--muted:#6b7280;
--green:#1f9d55;
--red:#e03d3d;
}

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:var(--bg);
}

main{
max-width:1000px;
margin:auto;
padding:20px;
}

#lessonGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:16px;
margin-bottom:22px;
}

.lessonBtn{
background:white;
border-radius:12px;
padding:18px;
cursor:pointer;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.lessonBtn:hover{
transform:translateY(-5px);
}

#textDisplay{
min-height:140px;
padding:14px;
border-radius:8px;
border:1px dashed #ccc;
font-size:20px;
line-height:1.7;
background:white;
}

.ch.current{
background:yellow;
}

.correct{
color:green;
font-weight:bold;
}

.incorrect{
color:red;
font-weight:bold;
}

.statsGrid{
display:flex;
gap:14px;
margin-top:12px;
flex-wrap:wrap;
}

.stat{
background:#fff;
padding:10px 12px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

#results{
margin-top:16px;
padding:12px;
border-radius:10px;
background:white;
display:none;
}

</style>
</head>

<body>

<main>

<section id="lessonsSection">
<h2>Choose a Lesson</h2>
<div id="lessonGrid"></div>
</section>

<section id="testArea" style="display:none">

<button id="backToLessons">← Back</button>

<h3 id="lessonTitle"></h3>

<div id="textDisplay"></div>

<div class="statsGrid">
<div class="stat"><strong id="time">00:00</strong><small>Time</small></div>
<div class="stat"><strong id="correctCount">0</strong><small>Correct</small></div>
<div class="stat"><strong id="wrongCount">0</strong><small>Wrong</small></div>
<div class="stat"><strong id="accuracy">0%</strong><small>Accuracy</small></div>
<div class="stat"><strong id="wpm">0</strong><small>WPM</small></div>
</div>

<div id="results">
<h4>Result</h4>
<p id="finalSummary"></p>
</div>

</section>

</main>

<script>
 const lessons = {
    lesson1: ["all","ask","has","dad","sad","had","lad","lag","add","flag","gas","fall","hall","jaals","dada","jaffa","alaska","lass","alfa","kafla","dass","dash","flash","skaff","lakh","shall","gash","glass","alas","half","salad","glad","slag","kala","salsa","jags"],
    lesson2: ["wise","fly","tap","yak","see","ill","oil","owl","thats","wife","keep","safe","fail","less","tell","leaf","quill","post","joes","with","ugly","skill","silk","risk","hair","first","kids","user","shell","offer","tea","sail","seal","life","lead","desk","dull","that","frogs","alert","park","faith","its","lets","early","eagle","towel","whose","judge","their","other","eight","looks","agreed","good","house","fifth","word","loyal","right","truth","youth","should","laugh","would","height","flight","author","fight","great","three","tiger","useful","yellow","idiot","south","style","dutiful","quality","large","yesterday","spiritual"],
    lesson3: ["fox","box","boy","copycat","mat","milk","nice","net","next","meat","lamb","zila","hint","veto","lock","chart","body","dr","doze","zero","neck","need","xray","navy","moon","meet","value","zebra","mike","quick","sixth","burn","turn","smell","limbs","some","chase","maps","prison","defects","fabric","print","number","action","humble","nation","major","exactly","cut","cross","purpose","charity","define","miracle","brought","young","caught","many","universe","manner","money","margin","smooth","valley","zenith","liable","knees","narrow","boxing","vacant","current","nature","magic"],
    lesson4: ["Dada","Alfas","Alaska","Salsa","Gash","Slash","Hash","Dalda","Hall","Skaff","Slag","Glass","Da","Khaf","Dallas","Khallas","Falk","Sa","Jaal","Shalk","Alfa","Dall","Shall","Halk","Kafla","Ga","Sallad","Slags","Jaffa","Lass","Dass","Lag","Add","Flag","Gas","Fall"],
    lesson5: ["Aid","Slide","Flies","Pares","Safe","Yule","Ride","Dialogue","Jealousy","Tailor","Europe","Quetta","Hillary","Sleek","Guide","Leaf","People","Equip","Earth","Jupiter","Roses","Yellow","Flight","Glory","Slowly","Author","Tuesday","Youth","April","Lily","Tulip","Tiger","Lotus","Growth","Ganges","Goal","Hour","Regard","Follow","Diesel","Fiddle","Failed","Pride","Feature","Years","Result","Farewell","Foods"],
    lesson6: ["India","British","Kabir","Venus","Needle","Foreign","Cycle","Mainly","Million","Nation","Oxford","Calcutta","Nanak","Scale","Nylon","Beggar","Zigs","Negative","Over","Nature","Wizard","Inkpot","Remington","Switzerland","United","Studies","Lovely","Smooth","Opinion","Onion","Query","Zealous","Tundra","Village","Literacy","Education","Policies","Country","Machine","Hungry","Diwali","Beautiful","Knowledge","Blessing","Amazing"],
    lesson7: ["simple","practice","typing","speed","accuracy","focus","finger","position","keyboard","repeat","steady","rhythm","exercise","progress","improve","words","letters","control","timing","steady","smooth","skill"],
    lesson8: ["computer","program","language","function","variable","object","array","string","process","thread","network","server","client","browser","runtime","compile","debug","deploy","design","architecture","protocol"],
    lesson9: ["science","technology","engineering","mathematics","research","experiment","discover","method","analysis","results","hypothesis","theory","model","measure","sample","control","variable","observe","conclude","apply"],
    lesson10:["future","innovation","creative","vision","strategy","growth","leadership","teamwork","product","service","market","value","customer","insight","design","iterate","launch","scale","optimize","sustain"]
  };

 

const lessonGrid=document.getElementById("lessonGrid");
const lessonsSection=document.getElementById("lessonsSection");
const testArea=document.getElementById("testArea");
const backToLessons=document.getElementById("backToLessons");
const lessonTitle=document.getElementById("lessonTitle");
const textDisplay=document.getElementById("textDisplay");

const correctCountEl=document.getElementById("correctCount");
const wrongCountEl=document.getElementById("wrongCount");
const accuracyEl=document.getElementById("accuracy");
const wpmEl=document.getElementById("wpm");
const timeEl=document.getElementById("time");

const resultsBox=document.getElementById("results");
const finalSummary=document.getElementById("finalSummary");

let currentLesson=null;
let currentString="";
let charSpans=[];
let cursor=0;

let startedAt=0;
let timerId=null;

let correctChars=0;
let wrongHits=0;
let wrongKeyStats={};

Object.keys(lessons).forEach((k,i)=>{
const btn=document.createElement("div");
btn.className="lessonBtn";
btn.innerHTML=`Lesson ${i+1}`;
btn.onclick=()=>startLesson(k);
lessonGrid.appendChild(btn);
});

function startLesson(key){

currentLesson=key;

lessonTitle.textContent="Lesson "+(Object.keys(lessons).indexOf(key)+1);

lessonsSection.style.display="none";
testArea.style.display="block";

resetStats();

currentString=generateRandomText(key,60);

renderText(currentString);

}

function generateRandomText(lessonKey,count){

const pool=lessons[lessonKey];
const arr=[];

for(let i=0;i<count;i++){
arr.push(pool[Math.floor(Math.random()*pool.length)]);
}

return arr.join(" ");
}

function renderText(str){

textDisplay.innerHTML="";
charSpans=[];

for(let i=0;i<str.length;i++){

const span=document.createElement("span");

span.className="ch";
span.textContent=str[i];

textDisplay.appendChild(span);

charSpans.push({span,char:str[i]});

}

cursor=0;
updateVisuals();

}

function updateVisuals(){

charSpans.forEach(o=>{
o.span.classList.remove("current","correct","incorrect");
});

if(cursor<charSpans.length){

charSpans[cursor].span.classList.add("current");

}

}

function resetStats(){

clearInterval(timerId);

startedAt=0;

correctChars=0;
wrongHits=0;
wrongKeyStats={};

cursor=0;

correctCountEl.textContent=0;
wrongCountEl.textContent=0;
accuracyEl.textContent="0%";
wpmEl.textContent=0;
timeEl.textContent="00:00";

}

function startTimer(){

if(startedAt)return;

startedAt=Date.now();

timerId=setInterval(updateTimer,500);

}

function updateTimer(){

let sec=Math.floor((Date.now()-startedAt)/1000);

let m=String(Math.floor(sec/60)).padStart(2,"0");
let s=String(sec%60).padStart(2,"0");

timeEl.textContent=m+":"+s;

updateWPM();

}

function updateWPM(){

let min=(Date.now()-startedAt)/60000;

if(min<=0)return;

let wpm=Math.round((correctChars/5)/min);

wpmEl.textContent=wpm;

}

function updateAccuracy(){

let total=correctChars+wrongHits;

let acc=total?Math.round((correctChars/total)*100):0;

accuracyEl.textContent=acc+"%";

}

window.addEventListener("keydown",e=>{

if(testArea.style.display!=="block")return;

if(e.key==="Backspace"){

e.preventDefault();

if(cursor>0){

cursor--;

charSpans[cursor].span.classList.remove("correct","incorrect");

}

return;

}

if(e.key.length!==1)return;

if(!startedAt)startTimer();

const expected=charSpans[cursor].char;
const pressed=e.key;

if(pressed===expected){

charSpans[cursor].span.classList.remove("current");

charSpans[cursor].span.classList.add("correct");

correctChars++;

cursor++;

correctCountEl.textContent=correctChars;

}

else{

wrongHits++;

wrongCountEl.textContent=wrongHits;

charSpans[cursor].span.classList.add("incorrect");

let key=pressed===" "?"space":pressed;

wrongKeyStats[key]=(wrongKeyStats[key]||0)+1;

}

updateAccuracy();

if(cursor<charSpans.length){

updateVisuals();

}

else{

finishTest();

}

});

function finishTest(){

clearInterval(timerId);

let sec=Math.floor((Date.now()-startedAt)/1000);

let min=sec/60;

let wpm=Math.round((correctChars/5)/min);

let acc=Math.round((correctChars/(correctChars+wrongHits))*100);

let mistakes="";

Object.entries(wrongKeyStats)
.sort((a,b)=>b[1]-a[1])
.forEach(([k,v])=>{

mistakes+=`${k} → ${v} times<br>`;

});

finalSummary.innerHTML=`

Completed in ${sec}s<br>
WPM: ${wpm}<br>
Accuracy: ${acc}%<br><br>

Correct characters: ${correctChars}<br>
Wrong hits: ${wrongHits}<br><br>

<b>Most common mistakes</b><br>
${mistakes}

`;

resultsBox.style.display="block";

}

backToLessons.onclick=()=>{

testArea.style.display="none";
lessonsSection.style.display="block";

};

</script>

</body>
</html>

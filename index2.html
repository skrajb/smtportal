<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Exercises Manager</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0; padding: 0;
  }
  .container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 12px;
    padding: 20px 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  textarea {
    width: 100%;
    height: 120px;
    font-size: 16px;
    border-radius: 8px;
    padding: 10px;
    border: 1px solid #ccc;
    resize: vertical;
  }
  .button {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 10px 18px;
    margin: 10px 4px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 15px;
  }
  .button:hover { background-color: #0056b3; }
  .highlight { background: #eaf4ff; border-left: 4px solid #007bff; }
  .chunk {
    margin: 12px 0;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    transition: all 0.3s;
  }
  .stats { font-size: 14px; color: #444; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h2>Typing Exercises Manager</h2>
  <label>Exercise Language:</label><br>
  <input type="text" id="language" placeholder="e.g. English"><br><br>
  
  <label>Language Number:</label><br>
  <input type="text" id="languageNum" placeholder="e.g. 1, 2, 3"><br><br>

  <label>Exercise Text:</label><br>
  <textarea id="exerciseText" placeholder="Paste exercise text here (quotes supported)"></textarea><br>

  <button class="button" onclick="loadExercise()">Load Exercise</button>
  <button class="button" onclick="submitResult()">Submit</button>

  <div id="chunksContainer"></div>
  <div class="stats" id="stats"></div>
</div>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());

  let chunks = [];
  let currentIndex = 0;
  let totalBackspaces = 0;
  let startTime = null;
  let timerInterval = null;
  let exerciseLanguage = '';
  let languageNumber = '';

  function loadExercise() {
    const text = document.getElementById('exerciseText').value;
    if (!text.trim()) return alert("Please paste exercise text first!");
    exerciseLanguage = document.getElementById('language').value.trim() || 'Unknown';
    languageNumber = document.getElementById('languageNum').value.trim() || '0';

    chunks = splitIntoChunks(text, 10);
    renderChunks();
    totalBackspaces = 0;
    currentIndex = 0;
    startTime = Date.now();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 1000);
  }

  function splitIntoChunks(text, parts) {
    const sentences = text.split(/(\s+)/).filter(Boolean);
    const size = Math.ceil(sentences.length / parts);
    const chunks = [];
    for (let i = 0; i < parts; i++) {
      const chunkText = sentences.slice(i * size, (i + 1) * size).join('');
      if (chunkText.trim()) chunks.push(chunkText);
    }
    return chunks;
  }

  function renderChunks() {
    const container = document.getElementById('chunksContainer');
    container.innerHTML = '';
    chunks.forEach((chunk, i) => {
      const div = document.createElement('div');
      div.className = 'chunk' + (i === 0 ? ' highlight' : '');
      div.innerHTML = `
        <div><strong>Chunk ${i + 1}</strong></div>
        <div>${chunk}</div>
        <textarea id="input${i}" onkeydown="handleKey(event, ${i})"></textarea>
      `;
      container.appendChild(div);
    });
  }

  function handleKey(e, index) {
    if (!startTime) startTime = Date.now();

    if (e.key === 'Backspace') totalBackspaces++;
    if (e.key === 'Enter' || e.key === 'ArrowDown') {
      e.preventDefault();
      moveToChunk(index + 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      moveToChunk(index - 1);
    }
  }

  function moveToChunk(index) {
    if (index < 0 || index >= chunks.length) return;
    document.querySelectorAll('.chunk').forEach(c => c.classList.remove('highlight'));
    const target = document.getElementById(`input${index}`);
    if (target) {
      target.parentElement.classList.add('highlight');
      target.focus();
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      currentIndex = index;
    }
  }

  function updateTimer() {
    if (!startTime) return;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    document.getElementById('stats').innerText = `Timer: ${mins}:${secs} | Backspaces: ${totalBackspaces}`;
  }

  async function submitResult() {
    if (!chunks.length) return alert('Load an exercise first!');
    clearInterval(timerInterval);
    const timeTaken = Math.floor((Date.now() - startTime) / 1000);
    const inputs = chunks.map((_, i) => document.getElementById(`input${i}`).value);
    const totalTyped = inputs.join(' ').length;

    const data = {
      language: exerciseLanguage,
      languageNum: languageNumber,
      backspaces: totalBackspaces,
      timeTaken: timeTaken,
      totalChars: totalTyped,
      date: new Date().toLocaleString(),
    };

    try {
      await fetch('https://script.google.com/macros/s/AKfycbxQ4PpwBUH2uwXHSUZgCen2LiM_jhaCBK52wGfbU0XqFavWBOqDFu5lNaN6MFiqWbxTvA/exec', {
        method: 'POST',
        body: JSON.stringify(data),
      });
      alert('Result successfully saved!');
    } catch (err) {
      console.error(err);
      alert('Saving failed (offline or Apps Script error). Data stored locally.');
      localStorage.setItem('lastTypingResult', JSON.stringify(data));
    }
  }
</script>
</body>
</html>
